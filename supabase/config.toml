project_id = "shiftsync"

[auth]
enable_signup = true
enable_anonymous_sign_ins = false
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/home"
]

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_CLIENT_SECRET)"

[functions."parse-excel"]
verify_jwt = false

[functions."process-shared-schedule"]
verify_jwt = false

[functions."send-swap-hr-email"]
verify_jwt = false

[functions."send-leave-hr-email"]
verify_jwt = false

[functions."send-request-reminder-email"]
verify_jwt = false

[functions."swap-hr-actions"]
verify_jwt = false

[functions."leave-hr-actions"]
verify_jwt = false

[functions."calendar-sync"]
verify_jwt = true

[functions."calendar-sync-scheduler"]
verify_jwt = false
